name: Playwright Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

  workflow_dispatch:

  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: Playwright-Practice/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Playwright-Practice

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: Playwright-Practice

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}
        working-directory: Playwright-Practice

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: Playwright-Practice/playwright-report
          retention-days: 10

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}
          path: Playwright-Practice/allure-results

  allure:
    needs: test

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          path: allure-artifacts

      - name: Merge Allure Results
        run: |
          mkdir allure-results
          find allure-artifacts -type f -exec cp {} allure-results/ \;

      - name: Install Allure
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-history

      - name: Deploy Allure to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
